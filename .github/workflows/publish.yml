name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # AGP 8.4 のビルド実行には JDK 17 が必要
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 公開リポジトリには Gradle Wrapper を含めないため、Gradle 本体を用意する。
      # Wrapper の gradle-wrapper.properties に合わせた Gradle 8.6 を使用する。
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Publish and release to Maven Central
        run: gradle publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
